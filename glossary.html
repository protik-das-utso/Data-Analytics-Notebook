<script>
(function () {
  var G = (window.GLOSSARY || []).slice().sort(function (a, b) { return a.term.toLowerCase() < b.term.toLowerCase() ? -1 : 1; });
  var list = document.getElementById('glossList');
  var count = document.getElementById('glossCount');
  var search = document.getElementById('glossSearch');
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function render(q) {
    q = (q || '').trim().toLowerCase();
    var shown = G.filter(function (e) {
      if (!q) return true;
      var hay = (e.term + ' ' + (e.aliases || []).join(' ') + ' ' + e.def).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
    count.textContent = shown.length + ' of ' + G.length + ' terms';
    if (!shown.length) { list.innerHTML = '<div class="gloss-empty">No terms match &ldquo;' + esc(q) + '&rdquo;.</div>'; return; }
    list.innerHTML = shown.map(function (e) {
      return '<div class="gloss-card"><h4>' + esc(e.term) + '</h4><p>' + esc(e.def) + '</p></div>';
    }).join('');
  }
  render('');
  if (search) search.addEventListener('input', function () { render(search.value); });
})();
</script>
