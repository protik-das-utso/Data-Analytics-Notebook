    <span class="st">"""Quick summary report for any numeric column."""</span>
    <span class="fn">print</span>(<span class="st">f"=== Report: {numeric_col} ==="</span>)
    <span class="fn">print</span>(<span class="st">f"Count:    {df[numeric_col].count():,}"</span>)
    <span class="fn">print</span>(<span class="st">f"Mean:     {df[numeric_col].mean():,.2f}"</span>)
    <span class="fn">print</span>(<span class="st">f"Median:   {df[numeric_col].median():,.2f}"</span>)
    <span class="fn">print</span>(<span class="st">f"Std Dev:  {df[numeric_col].std():,.2f}"</span>)
    <span class="fn">print</span>(<span class="st">f"Min/Max:  {df[numeric_col].min():,.2f} / {df[numeric_col].max():,.2f}"</span>)

    if category_col:
        <span class="fn">print</span>(<span class="st">f"\nBy {category_col}:"</span>)
        <span class="fn">print</span>(df.groupby(category_col)[numeric_col].mean().sort_values(ascending=False))

quick_report(df, <span class="st">'salary'</span>, <span class="st">'department'</span>)</pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<div class="section-title">11.4 Analytics project checklist</div>
<ul class="steps">
<li>Define the business question before touching any data</li>
<li>Understand the data source: who collected it, how, and when</li>
<li>Run EDA and document all findings and anomalies</li>
<li>Save df_raw = df.copy() before any cleaning</li>
<li>Document every cleaning decision with a comment explaining why</li>
<li>Validate your findings: do they make sense in real life?</li>
<li>Use at least 2 different methods to confirm important conclusions</li>
<li>Present findings visually — stakeholders read charts, not tables</li>
<li>State limitations and data quality issues in your report</li>
<li>Save cleaned data + notebook for full reproducibility</li>
</ul>
<div class="section-title">11.5 Full library reference</div>
<table class="ref">
<tr><th>Library</th><th>Purpose</th><th>Key functions</th></tr>
<tr><td><code>pandas</code></td><td>Data manipulation</td><td>read_csv, groupby, merge, pivot_table</td></tr>
<tr><td><code>numpy</code></td><td>Math & arrays</td><td>array, mean, std, log1p, where</td></tr>
<tr><td><code>matplotlib</code></td><td>Base plotting</td><td>plot, subplots, savefig</td></tr>
<tr><td><code>seaborn</code></td><td>Statistical charts</td><td>histplot, boxplot, heatmap, pairplot</td></tr>
<tr><td><code>plotly</code></td><td>Interactive charts</td><td>scatter, bar, line, choropleth</td></tr>
<tr><td><code>scipy</code></td><td>Statistical tests</td><td>ttest_ind, chi2_contingency, normaltest</td></tr>
<tr><td><code>scikit-learn</code></td><td>Machine learning</td><td>fit, predict, cross_val_score, GridSearchCV</td></tr>
<tr><td><code>openpyxl</code></td><td>Excel files</td><td>Used by pandas to read/write xlsx</td></tr>
</table>
<div class="tip">Great analysts ask "why?" at every step. Numbers tell a story — your job is to find it and communicate it clearly.</div>`
},
{tag:"Chapter 12 — Professional",title:"Documentation, Ethics & Optimization",desc:"Professional analytics workflow: reproducibility, data privacy, bias checks, and performance scaling for large datasets.",
content:`<div class="section-title">12.0 Documentation & reproducibility</div>
<table class="ref">
<tr><th>Practice</th><th>How to apply</th><th>Why it matters</th></tr>
<tr><td>Version control</td><td>Use Git with clear commits for each analysis stage</td><td>Traceable decisions and safe rollback</td></tr>
<tr><td>README</td><td>Describe goal, data source, pipeline, and outputs</td><td>Fast onboarding for reviewers/interviewers</td></tr>
<tr><td>Data dictionary</td><td>List columns, definitions, units, and valid ranges</td><td>Prevents interpretation mistakes</td></tr>
<tr><td>Reproducible steps</td><td>Pin package versions and run steps in order</td><td>Same results across machines</td></tr>
</table>
<div class="note"><strong>Notebook vs script:</strong> notebook is best for exploration and storytelling; script is best for automation, CI, and repeatable production tasks. Keep both for serious projects.</div>
<div class="section-title">12.1 Data ethics & privacy</div>
<ul class="steps">
<li>Remove or mask personal identifiers before sharing datasets</li>
<li>Restrict access to sensitive columns (PII, health, finance)</li>
<li>Check demographic bias in model outputs and errors</li>
<li>Explain ethical limits: what your model should NOT decide</li>
<li>Record consent, legal restrictions, and retention policy</li>
</ul>
<div class="warn">Do not expose personal data in screenshots, dashboards, or exported notebooks. Create anonymized demo versions for portfolio use.</div>
<div class="section-title">12.2 Performance optimization for large datasets</div>
<div class="code-block"><div class="code-label">python</div><pre><span class="cm"># Memory profile</span>
df.memory_usage(deep=True).sort_values(ascending=False).head(10)

<span class="cm"># Use category dtype for low-cardinality text columns</span>
for c in [<span class="st">'city'</span>, <span class="st">'department'</span>, <span class="st">'status'</span>]:
    df[c] = df[c].astype(<span class="st">'category'</span>)

<span class="cm"># Load only required columns</span>
df = pd.read_csv(<span class="st">'data/raw/sales.csv'</span>, usecols=[<span class="st">'date'</span>, <span class="st">'region'</span>, <span class="st">'revenue'</span>])

<span class="cm"># Process in chunks</span>
for chunk in pd.read_csv(<span class="st">'data/raw/huge.csv'</span>, chunksize=10000):
    <span class="cm"># transform chunk then append aggregate</span>
    pass</pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<div class="tip">For repeated heavy workloads, store processed tables as Parquet and run aggregations at source (SQL) before loading to Python.</div>`
},
{tag:"Chapter 13 — Career",title:"Portfolio & Career Execution",desc:"Turn analysis work into interview-ready portfolio projects with clear business impact.",
content:`<div class="section-title">13.0 Portfolio roadmap</div>
<ol class="workflow">
<li><strong>Build 3 real projects</strong><span>Use different domains (sales, customer churn, operations) and document end-to-end workflow.</span></li>
<li><strong>Publish to GitHub</strong><span>Each project should include README, notebook/script, data dictionary, and output visuals.</span></li>
<li><strong>Create portfolio website</strong><span>Present project story, your role, stack used, and measurable outcomes.</span></li>
<li><strong>Explain simply</strong><span>Practice non-technical explanation: what happened, why, and what action to take.</span></li>
<li><strong>Show business impact</strong><span>Quantify value: revenue uplift, cost reduction, risk reduction, or speed improvement.</span></li>
</ol>
<div class="section-title">13.1 Interview-ready project template</div>
<table class="ref">
<tr><th>Section</th><th>What to include</th></tr>
<tr><td>Problem</td><td>Business pain point and success metric</td></tr>
<tr><td>Data</td><td>Source, timeframe, grain, quality challenges</td></tr>
<tr><td>Approach</td><td>Cleaning, EDA, feature logic, model/testing choices</td></tr>
<tr><td>Result</td><td>Charts + metrics + key insights</td></tr>
<tr><td>Recommendation</td><td>Concrete action with expected impact</td></tr>
<tr><td>Limitations</td><td>Known risks, assumptions, and next iteration plan</td></tr>
</table>
<div class="tip">Recruiters and hiring managers remember projects that connect technical work to a business decision. Always include decision impact, not only model score.</div>`
},
{tag:"Chapter 14 — Documentation",title:"Project Documentation Pack",desc:"Ready-to-use templates and standards for README, data dictionary, validation log, and handover notes.",
content:`<div class="section-title">14.0 Why this chapter matters</div>
<div class="note"><strong>Good analysis without documentation is hard to trust and hard to reuse.</strong> Use this chapter as your final quality gate before sharing a notebook, dashboard, or model output.</div>
<div class="section-title">14.1 Required documentation set</div>
<table class="ref">
<tr><th>Document</th><th>Minimum content</th><th>Owner</th><th>Update frequency</th></tr>
<tr><td>README</td><td>Business goal, data source, setup steps, outputs, limitations</td><td>Analyst</td><td>Every major update</td></tr>
<tr><td>Data dictionary</td><td>Column name, meaning, type, units, allowed values, null policy</td><td>Analyst + data owner</td><td>When schema changes</td></tr>
<tr><td>Cleaning log</td><td>What changed, why changed, impact on row count/metrics</td><td>Analyst</td><td>Every cleaning operation</td></tr>
<tr><td>Validation log</td><td>Checks run, pass/fail result, unresolved issues</td><td>Analyst / reviewer</td><td>Before reporting</td></tr>
<tr><td>Handover note</td><td>How to rerun analysis, dependencies, known risks, next steps</td><td>Project owner</td><td>At delivery</td></tr>
</table>
<div class="section-title">14.2 Validation checklist before publish</div>
<ul class="steps">
<li>Business question and target KPI are written in one sentence</li>
<li>Data source and extraction date are documented</li>
<li>All filters/cleaning rules are explained</li>
<li>Key assumptions are stated and justified</li>
<li>At least one limitation and one risk are reported</li>
<li>Charts include units, time range, and interpretation note</li>
<li>Result files are reproducible from the notebook/script</li>
<li>Privacy-sensitive columns are masked or removed</li>
</ul>
<div class="section-title">14.3 Markdown starter templates</div>
<div class="code-block"><div class="code-label">README.md skeleton</div><pre># Project Title

## Business Question
- What decision this analysis supports

## Data Source
- File/table name
- Date range
- Row granularity

## Method Overview
1. Data loading
2. EDA
3. Cleaning and transformation
4. Analysis/modeling
5. Reporting

## Key Findings
- Insight 1
- Insight 2

## Limitations
- Limitation 1

## Repro Steps
- Install dependencies
- Run notebook/script order
</pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<div class="code-block"><div class="code-label">Data dictionary skeleton</div><pre>| column_name | description | dtype | unit | allowed_values | null_policy |
|---|---|---|---|---|---|
| customer_id | unique customer key | string | n/a | unique | never null |
| order_date | transaction date | datetime | yyyy-mm-dd | valid dates | drop if null |
| revenue | order revenue | float | USD | >= 0 | fill 0 if missing |
</pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<div class="tip">Use the sidebar template tools to copy or save these documents quickly for every new project.</div>`
}
];

let current = 0;
const nav = document.getElementById('nav');
const chaptersEl = document.getElementById('chapters');
const progress = document.getElementById('progress');
const chapterSearch = document.getElementById('chapterSearch');
const chapterStats = document.getElementById('chapterStats');
const docTemplate = document.getElementById('docTemplate');
const copyDocTemplate = document.getElementById('copyDocTemplate');
const downloadDocTemplate = document.getElementById('downloadDocTemplate');

const STORAGE_KEYS = {
    completed: 'da_notebook_completed',
    bookmarks: 'da_notebook_bookmarks',
    theme: 'da_notebook_theme'
};

const completed = JSON.parse(localStorage.getItem(STORAGE_KEYS.completed) || '[]');
const bookmarks = JSON.parse(localStorage.getItem(STORAGE_KEYS.bookmarks) || '[]');

const chapterMistakes = {
    'Exploratory Data Analysis': [
        'Using mean on skewed data without checking distribution first',
        'Ignoring duplicates and then trusting wrong aggregates',
        'Assuming correlation means causation'
    ],
    'Data Cleaning': [
        'Dropping null values blindly without checking missingness pattern',
        'Converting dtypes without validating failed coercions',
        'Deleting all outliers even when they are real business events'
    ],
    'Data Visualization': [
        'Using pie charts for high-cardinality categories',
        'Using wrong chart type for the question',
        'Publishing charts without axis units or context'
    ],
    default: [
        'Skipping business context before running technical steps',
        'Not writing assumptions and limitations explicitly',
        'Treating one metric as the full story'
    ]
};

const chapterCheatsheets = {
    default: [
        { cmd: 'df.info()', desc: 'Structure and non-null counts' },
        { cmd: 'df.describe()', desc: 'Numeric summary statistics' },
        { cmd: 'df.isnull().sum()', desc: 'Missing-value counts by column' },
        { cmd: 'df.groupby()', desc: 'Segmented aggregation' },
        { cmd: 'pd.merge()', desc: 'Join multiple datasets' }
    ],
    'Machine Learning Basics': [
        { cmd: 'train_test_split()', desc: 'Create holdout set before training' },
        { cmd: 'model.fit()', desc: 'Train model on training data' },
        { cmd: 'model.predict()', desc: 'Generate predicted labels/values' },
        { cmd: 'classification_report()', desc: 'Precision/recall/F1 breakdown' },
        { cmd: 'cross_val_score()', desc: 'Cross-validated performance' }
    ]
};

const documentationTemplates = {
    readme: `# Project Title

## Business Question
- What decision this analysis supports

## Data Source
- Source:
- Date pulled:
- Time range:
- Grain:

## Workflow
1. Data loading
2. EDA
3. Cleaning
4. Transformation / feature engineering
5. Analysis or modeling
6. Reporting

## Key Findings
- Finding 1
- Finding 2

## Limitations
- Limitation 1

## Reproducibility
- Python version:
- Libraries:
- Run order:
`,
    dictionary: `| column_name | description | dtype | unit | allowed_values | null_policy |
|---|---|---|---|---|---|
|  |  |  |  |  |  |
|  |  |  |  |  |  |
|  |  |  |  |  |  |
`,
    analysis: `# Analysis Log

## Project
- Name:
- Analyst:
- Date:

## Step-by-step record
| step | action | reason | impact |
|---|---|---|---|
| data load |  |  |  |
| cleaning |  |  |  |
| transformation |  |  |  |
| validation |  |  |  |

## Open Issues
- Issue 1

## Next Actions
- Action 1
`
};

function getProjectExecutionTemplate() {
    return `<div class="section-title">Project Execution Template</div>
<div class="note"><strong>Use this template before you start every project.</strong> It keeps analysis focused and interview-ready.</div>
<table class="ref">
<tr><th>Field</th><th>Your note</th></tr>
<tr><td>Problem statement</td><td>What business issue are you solving?</td></tr>
<tr><td>Dataset</td><td>Name, source, timeframe, granularity</td></tr>
<tr><td>Objective</td><td>What decision should this analysis support?</td></tr>
<tr><td>KPI / metric</td><td>Primary success measure</td></tr>
<tr><td>Hypothesis</td><td>What do you expect and why?</td></tr>
</table>
<ul class="steps">
<li>Business question clearly defined</li>
<li>Stakeholder identified</li>
<li>Expected output decided (dashboard / report / model)</li>
</ul>
<div class="tip">Why this helps: it makes your notebook reusable for portfolio and job interviews, not just one-off analysis.</div>`;
}

function getMLStarterSection() {
    return `<div class="section-title">ML starter flow (copy template)</div>
<div class="note"><strong>Classification predicts categories</strong> (churn yes/no, fraud yes/no). <strong>Regression predicts numbers</strong> (sales, price, demand). Start with a simple baseline before complex models.</div>
<div class="code-block"><div class="code-label">python</div><pre><span class="cm"># Train-test split</span>
X = df.drop(<span class="st">'target'</span>, axis=1)
y = df[<span class="st">'target'</span>]

X_train, X_test, y_train, y_test = train_test_split(X, y)

<span class="cm"># Model</span>
from sklearn.linear_model import LogisticRegression
model = LogisticRegression()

model.fit(X_train, y_train)

<span class="cm"># Prediction</span>
y_pred = model.predict(X_test)

<span class="cm"># Evaluation</span>
accuracy_score(y_test, y_pred)</pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>`;
}

function getReportingBooster() {
    return `<div class="section-title">Dashboard & business storytelling</div>
<div class="tip">Build your final output in Power BI, Tableau, or Excel depending on stakeholder tooling. Export a clean dataset and always answer three questions: what happened, why it happened, and what we should do next.</div>`;
}

function buildMistakesSection(title) {
    const items = chapterMistakes[title] || chapterMistakes.default;
    return `<div class="section-title">Common mistakes to avoid</div>
<ul class="mistakes">${items.map(x => `<li>${x}</li>`).join('')}</ul>`;
}

function buildCheatSheetSection(title) {
    const rows = chapterCheatsheets[title] || chapterCheatsheets.default;
    return `<div class="section-title">Quick cheatsheet</div>
<div class="cheat-grid">${rows.map(r => `<div class="cheat-item"><code>${r.cmd}</code> -> ${r.desc}</div>`).join('')}</div>`;
}

function buildChapterSupplement(ch, index) {
    let intro = '';
    if (index === 0) intro += getProjectExecutionTemplate();
    if (ch.title === 'Machine Learning Basics') intro += getMLStarterSection();
    if (ch.title === 'Reporting & Communication') intro += getReportingBooster();

    return `${intro}${buildMistakesSection(ch.title)}${buildCheatSheetSection(ch.title)}`;
}

function getCompletionPct() {
    return Math.round((completed.length / chapters.length) * 100);
}

function saveState() {
    localStorage.setItem(STORAGE_KEYS.completed, JSON.stringify(completed));
    localStorage.setItem(STORAGE_KEYS.bookmarks, JSON.stringify(bookmarks));
}

function toggleComplete(index) {
    const pos = completed.indexOf(index);
    if (pos >= 0) completed.splice(pos, 1);
    else completed.push(index);
    saveState();
    updateSidebarState();
    renderChapterMeta(index);
}

function toggleBookmark(index) {
    const pos = bookmarks.indexOf(index);
    if (pos >= 0) bookmarks.splice(pos, 1);
    else bookmarks.push(index);
    saveState();
    updateSidebarState();
    renderChapterMeta(index);
}

function renderChapterMeta(index) {
    const chapter = document.querySelectorAll('.chapter')[index];
    const wrap = chapter.querySelector('.chapter-meta');
    if (!wrap) return;
    const isDone = completed.includes(index);
    const isStarred = bookmarks.includes(index);
    wrap.innerHTML = `
        <button class="meta-btn ${isDone ? 'done' : ''}" onclick="toggleComplete(${index})">${isDone ? 'Completed' : 'Mark as completed'}</button>
        <button class="meta-btn ${isStarred ? 'starred' : ''}" onclick="toggleBookmark(${index})">${isStarred ? 'Bookmarked' : 'Bookmark'}</button>
    `;
}

function updateSidebarState() {
    chapterStats.textContent = `Completed: ${getCompletionPct()}%`;
    progress.style.width = `${getCompletionPct()}%`;
    document.querySelectorAll('.nav-item').forEach((item, i) => {
        item.classList.toggle('bookmarked', bookmarks.includes(i));
    });
}

function resetProgress() {
    const confirmed = window.confirm('Reset all completed progress for a new project?');
    if (!confirmed) return;

    completed.length = 0;
    saveState();
    updateSidebarState();

    document.querySelectorAll('.chapter').forEach((chapter) => {
        const meta = chapter.querySelector('.chapter-meta');
        if (meta) {
            const index = Array.from(document.querySelectorAll('.chapter')).indexOf(chapter);
            if (index >= 0) renderChapterMeta(index);
        }
    });

    if (current !== 0) {
        goTo(0);
    } else {
        document.querySelectorAll('.chapter')[0].classList.add('active');
        document.querySelectorAll('.nav-item')[0].classList.add('active');
        window.scrollTo(0,0);
    }
}

chapters.forEach((ch, i) => {
  const item = document.createElement('div');
  item.className = 'nav-item' + (i===0?' active':'');
  item.innerHTML = `<span class="nav-num">${String(i+1).padStart(2,'0')}</span>${ch.title}`;
  item.onclick = () => goTo(i);
  nav.appendChild(item);

  const div = document.createElement('div');
  div.className = 'chapter' + (i===0?' active':'');
  div.innerHTML = `
    <div class="ch-tag">${ch.tag}</div>
    <div class="ch-title">${ch.title}</div>
    <div class="ch-desc">${ch.desc}</div>
        <div class="chapter-meta"></div>
    ${ch.content}
    ${buildChapterSupplement(ch, i)}
    <div class="nav-footer">
      ${i>0?`<button class="nav-btn" onclick="goTo(${i-1})">&#8592; Previous</button>`:'<span></span>'}
      ${i<chapters.length-1?`<button class="nav-btn primary" onclick="goTo(${i+1})">Next &#8594;</button>`:'<div style="font-size:14px;color:#22c55e;font-weight:600">&#10003; Notebook complete!</div>'}
    </div>`;
  chaptersEl.appendChild(div);
    renderChapterMeta(i);
});

document.querySelectorAll('.code-block').forEach(block => {
    const label = block.querySelector('.code-label');
    if (!label) return;

    const normalized = label.textContent.trim().toLowerCase();
    let langClass = 'lang-generic';

    if (normalized.includes('python')) langClass = 'lang-python';
    else if (normalized.includes('terminal') || normalized.includes('shell') || normalized.includes('bash')) langClass = 'lang-terminal';
    else if (normalized.includes('layout') || normalized.includes('structure')) langClass = 'lang-layout';

    block.classList.add(langClass);
});

function goTo(idx) {
  document.querySelectorAll('.chapter')[current].classList.remove('active');
  document.querySelectorAll('.nav-item')[current].classList.remove('active');
  current = idx;
  document.querySelectorAll('.chapter')[current].classList.add('active');
  document.querySelectorAll('.nav-item')[current].classList.add('active');
  window.scrollTo(0,0);
  document.querySelectorAll('.nav-item')[current].scrollIntoView({block:'nearest'});
}

chapterSearch.addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('.nav-item').forEach((item) => {
        const text = item.textContent.toLowerCase();
        item.classList.toggle('hidden', q && !text.includes(q));
    });
});

document.getElementById('toggleTheme').addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    localStorage.setItem(STORAGE_KEYS.theme, isLight ? 'light' : 'dark');
});

document.getElementById('resetProgress').addEventListener('click', resetProgress);

if (localStorage.getItem(STORAGE_KEYS.theme) === 'light') {
    document.body.classList.add('light-theme');
}
updateSidebarState();

copyDocTemplate.addEventListener('click', () => {
    const key = docTemplate.value;
    const text = documentationTemplates[key] || '';
    navigator.clipboard.writeText(text).then(() => {
        copyDocTemplate.textContent = 'Copied';
        setTimeout(() => { copyDocTemplate.textContent = 'Copy'; }, 1400);
    });
});

downloadDocTemplate.addEventListener('click', () => {
    const key = docTemplate.value;
    const text = documentationTemplates[key] || '';
    const ext = key === 'dictionary' ? 'md' : 'md';
    const fileName = `${key}_template.${ext}`;
    const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
});

function copyCode(btn) {
  const pre = btn.previousElementSibling;
  const text = pre ? pre.innerText : '';
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied!';
    btn.style.color='#22c55e';
    setTimeout(()=>{btn.textContent='copy';btn.style.color='';},1500);
  });
}
</script>
</body>
</html>
